<p-confirmDialog />
<div class="category-container">
  <div class="page-header">
    <div class="header-left">
      <h2>Categories</h2>
      <p>Manage your task categories</p>
    </div>
    <button class="btn-add" (click)="showDialog()">+ Add Category</button>
  </div>

  <div class="categories-container">
    <div class="total-task">
      <h3 >All Categories ({{ categories.length}})</h3>
    </div>
    <div class="categories-card">
      @if (categories.length > 0 ){
        <p-table [value]="categories" [tableStyle]="{ 'min-width': '50rem' }" [paginator]="true" [rows]="5" [tableStyle]="{ 'min-width': '50rem' }" [rowsPerPageOptions]="[1, 2, 5]">
          <ng-template #header>
            <tr>
              <th>Title</th>
              <th>Color</th>
              <th>Actions</th>
            </tr>
          </ng-template>
          <ng-template #body let-cat let-index="index">
            <tr>
              <td>{{ cat.name }}</td>
              <td style="alignment-baseline: central"><p-colorpicker [(ngModel)]="cat.color" [disabled]="true"></p-colorpicker></td>
              <td>
                <button class="icon-btn" title="Edit" (click)="editCategory(cat)">
                  Edit
                </button>
                <p-button (click)="deleteCategory(cat.id)" label="Delete" severity="danger" [outlined]="true" />
              </td>
            </tr>
          </ng-template>
        </p-table>
      } @else {
        <div class="empty-state">
          <p>No categories found. Create a new category to get started!</p>
        </div>
      }
    </div>
  </div>
</div>


<div class="card flex justify-center">
  <p-dialog [header]="isEditing ? 'Edit Category' : 'Add Category'" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }">
    <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()">
      <span class="p-text-secondary block mb-8">Add Category for tasks.</span>
      <br><br>
      <div class="flex items-center gap-4 mb-4">
        <div>
          <label for="categoryName" class="font-semibold w-24">Category Name</label>
          <input pInputText class="flex-auto" autocomplete="off" formControlName="name" placeholder="Enter category name" />
        </div>
        <div>
          <label for="categoryColor" class="font-semibold w-24">Category Color</label>
          <p-colorPicker appendTo="body" formControlName="color"></p-colorPicker>    <!--Got it from PRIMENG-->
        </div>
      </div>
      <br><br>
      <div class="flex justify-end gap-2">
        <p-button type="Cancel" label="Cancel" severity="secondary" (click)="visible = false" />
        <p-button type="submit" [disabled]="categoryForm.invalid" [label]="(isEditing ? 'Update' : 'Add') + ' Category'" />
      </div>
    </form>
  </p-dialog>
</div>
