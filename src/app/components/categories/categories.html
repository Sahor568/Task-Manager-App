<div class="categories-container">
  <!-- Page Header -->
  <div class="page-header">
    <div class="header-left">
      <h2>Categories</h2>
      <p>Manage your task categories</p>
    </div>
    <button class="btn-add" (click)="openAddModal()">+ Add Category</button>
  </div>

  <!-- Categories List -->
  <div class="categories-card">
    <h3>All Categories ({{ categories.length }})</h3>

    <div class="category-list">
      <div class="category-item" *ngFor="let category of categories">
        <div class="category-left">
          <span
            class="color-dot"
            [style.background-color]="category.color"
          ></span>
          <span class="category-name">{{ category.name }}</span>
          <span class="category-hex">{{ category.color }}</span>
        </div>
        <div class="category-actions">
          <button class="icon-btn" (click)="openEditModal(category)" title="Edit">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <button class="icon-btn delete" (click)="deleteCategory(category)" title="Delete">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6"/>
              <path d="M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Category Modal -->
<div class="modal-overlay" *ngIf="showAddModal" (click)="closeModals()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h4>Add New Category</h4>
      <button class="close-btn" (click)="closeModals()">&#x2715;</button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label>Category Name</label>
        <input
          type="text"
          [(ngModel)]="newCategory.name"
          placeholder="Enter category name"
        />
      </div>
      <div class="form-group">
        <label>Color</label>
        <div class="color-row">
          <input type="color" [(ngModel)]="newCategory.color" />
          <input type="text" [(ngModel)]="newCategory.color" class="color-text" />
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-primary" (click)="addCategory()">Create</button>
      <button class="btn-secondary" (click)="closeModals()">Cancel</button>
    </div>
  </div>
</div>

<!-- Edit Category Modal -->
<div class="modal-overlay" *ngIf="showEditModal" (click)="closeModals()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h4>Edit Category</h4>
      <button class="close-btn" (click)="closeModals()">&#x2715;</button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label>Category Name</label>
        <input
          type="text"
          [(ngModel)]="editingCategory.name"
          placeholder="Enter category name"
        />
      </div>
      <div class="form-group">
        <label>Color</label>
        <div class="color-row">
          <input type="color" [(ngModel)]="editingCategory.color" />
          <input type="text" [(ngModel)]="editingCategory.color" class="color-text" />
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-primary" (click)="updateCategory()">Update</button>
      <button class="btn-secondary" (click)="closeModals()">Cancel</button>
    </div>
  </div>
</div>
