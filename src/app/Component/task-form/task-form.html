<div class="task-form-container">

  <h2>{{ isEditMode ? 'Edit Task' : 'Add Task' }}</h2>
  <p>{{ isEditMode ? 'Update task information' : 'Add task information' }}</p>

  <div class="task-card">
    <div class="card-title">Task Information</div>

    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">

      <div class="form-row">
        <div class="form-group">
          <label>Title <span class="required">*</span></label>
          <input type="text" placeholder="Enter task title" formControlName="title" />
        </div>

        <div class="form-group">
          <label for="category">Category <span class="required">*</span></label>
          <select id="category" formControlName="category">
            <option value="">Select category</option>
            @for (cat of categories; track cat.id) {
              <option value="{{ cat.name }}">{{ cat.name }}</option>
            }
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Due Date <span class="required">*</span></label>
          <input type="date" formControlName="dueDate" />
        </div>

        <div class="form-group">
          <label>Status</label>
          <select formControlName="status">
            <option value="">Select Status</option>
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea placeholder="Enter task description (optional)" formControlName="description"></textarea>
      </div>

      <div class="form-actions">
        <button class="btn-submit" type="submit" [disabled]="taskForm.invalid">{{ isEditMode ? 'Edit' : 'Add' }} Task</button>
        <button class="btn-cancel" type="button" (click)="onCancel()">Cancel</button>
      </div>

    </form>
  </div>

</div>
