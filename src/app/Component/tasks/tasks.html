<div class="task-container">
    <div class="page-header">
        <div class="header-left">
        <h2>Tasks</h2>
        <p>Manage your tasks efficiently</p>
        </div>
        <button class="btn-add" routerLink="/tasks-new">+ Add Task</button>
    </div>

    <div class="search-cotainer">
        <input type="text" placeholder="Search tasks..." (input)="onSearch($event)">
    </div>

    <div class="tasks-container">
      <div class="total-task">
        <h3 >Task ({{ tasks.length}})</h3>
      </div>
      <div class="filter-task">
        <label>Category</label>
        <select (input)="filterCategory($event)">
          <option value="">Select category</option>
          @for (cat of categories; track cat.id) {
            <option value="{{ cat.name }}">{{ cat.name }}</option>
          }
        </select>
        <label>Status</label>
        <select (input)="filterStatus($event)">
          <option value="">All</option>
          <option value="Pending">Pending</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
      </div>

      <div class="tasks-card">
        @if (tasks.length > 0) {

          <table border="1" width="100%" cellpadding="10" >
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Due Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>

            @for (t of tasks; track t.id) {
              <tr>
                <td>{{ t.title }}</td>
                <td>{{ t.category }}</td>
                <td>{{ t.dueDate }}</td>
                <td>{{ t.status }}</td>
                <td>
                  <button title="View" [routerLink]="['/tasks-detail', t.id]">
                    View
                  </button>
                  <button title="Edit" [routerLink]="['/tasks-edit', t.id]">
                    Edit
                  </button>
                  <p-toast position="top-right" />
                  <button title="Delete" (click)="deleteTask(t.id)">
                    Delete
                  </button>
                </td>
              </tr>
            }
          </table>
            } @else {
          <div class="empty-state">
            <p>No tasks found. Create a new task to get started!</p>
          </div>
        }

      </div>
    </div>
</div>
