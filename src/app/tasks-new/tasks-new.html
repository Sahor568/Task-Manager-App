<div class="addTask-container">

    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
        <div class="title">Add Task</div>
        <br><br>

        <label>Title</label>
        <input type="text" placeholder="Enter Title" formControlName="title">

        <br><br>

        <label>Category</label>
      <label for="category">Category</label>
      <select id="category" class="form-select" formControlName="category">
        <option value="">Select category</option>
        @for (cat of categories; track cat.id) {
          <option value="{{ cat.name }}">{{ cat.name }}</option>
        }
      </select>
        <br><br>

        <label>Due Date</label>
        <input type="date" formControlName="dueDate">
        <br><br>
        <label>Status</label>
        <select formControlName="status">
            <option value="">Select Status</option>
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
        </select>
        <br><br>

        <label>Description</label>
        <textarea placeholder="Enter Description" formControlName="description"></textarea>
        <br><br>

        <button type="submit" [disabled]="taskForm.invalid">Create Task</button>
        <button type="button" (click)="onCancel()">Cancel</button>

    </form>
</div>
