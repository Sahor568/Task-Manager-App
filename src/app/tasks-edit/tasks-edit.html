<div class="editTask-container">
    <form [formGroup]="taskForm" (ngSubmit)="updateTask()">
      <div class="title">
        <h1>Edit Task</h1>
      </div>
      <p>Update task information</p>
      <br><br>

      <label>Title</label>
      <input type="text" placeholder="Enter Title" formControlName="title" />
<!--      <p>{{ tasks.title }}</p>-->
      <br><br>

      <label>Category</label>
      <select >
<!--        <option value="">Select category</option>-->
        @for (cat of categories; track cat.id) {
          <option value="{{ cat.name }}">{{ cat.name }}</option>
        }
      </select>
      <br><br>

      <label>Due Date</label>
      <input type="date" formControlName="dueDate">
      <br><br>
      <label>Status</label>
      <select value="{{ tasks.status }}" class="form-select" formControlName="status">
        <option value="{{ tasks.status }}">{{ tasks.status }}</option>
        <option value="Pending">Pending</option>
        <option value="In Progress">In Progress</option>
        <option value="Completed">Completed</option>
      </select>
      <br><br>

      <label>Description</label>
      <textarea placeholder="Enter Description" formControlName="description"></textarea>
      <br><br>

      <button type="submit" [disabled]="taskForm.invalid">Update Task</button>
<!--     <button type="submit" >Update Task</button>-->
      <button type="button" (click)="onCancel()">Cancel</button>

    </form>
</div>
